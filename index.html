        function getImageQueueLoad() {
            return imageQueue.length + (imageIsProcessing ? 1 : 0);
        }

        function updateImageQueueButton() {
            const genBtn = document.getElementById('genBtn');
            const queueLoad = getImageQueueLoad();

            genBtn.disabled = queueLoad >= IMAGE_QUEUE_MAX;

            if (queueLoad >= IMAGE_QUEUE_MAX) {
                genBtn.innerText = `队列已满 (${queueLoad}/${IMAGE_QUEUE_MAX})`;
                return;
            }

            if (imageIsProcessing) {
                genBtn.innerText = `加入队列 (${queueLoad}/${IMAGE_QUEUE_MAX})`;
                return;
            }

            genBtn.innerText = "🚀 生成图片";
        }

        function updateImageQueueStatus(text, color = "#666") {
            const status = document.getElementById('status');
            status.innerText = text;
            status.style.color = color;
        }

        async function processImageQueue() {
            if (imageIsProcessing || imageQueue.length === 0) {
                updateImageQueueButton();
                return;
            }

            const task = imageQueue.shift();
            imageIsProcessing = true;
            updateImageQueueButton();
            await runImageGenerationTask(task);
            imageIsProcessing = false;
            updateImageQueueButton();

            if (imageQueue.length > 0) {
                processImageQueue();
            }
        }

        async function runImageGenerationTask(task) {
            const { apiKey, prompt, resolution, aspectRatio, model, refs } = task;

            toggleUI('image', true);
            document.getElementById('cancelBtn').style.display = 'block';
            updateImageQueueStatus("Thinking & Generating...", "#666");

            const apiProtocol = document.getElementById('apiProtocol').value;
            const requestModel = resolveImageModelForRequest(apiProtocol, model, resolution);
            let apiBaseUrl = document.getElementById('apiBaseUrl').value.trim();

            try {
                imageAbortController = new AbortController();
                let finalBase64 = null;

                if (apiProtocol === 'openai') {
                    if (!apiBaseUrl) apiBaseUrl = "https://api.openai.com";
                    apiBaseUrl = apiBaseUrl.replace(/\/+$/, '');

                    const promptWithAspect = buildProxyAspectRatioPrompt(prompt, aspectRatio);
                    let proxyError = "";

                    const payload = {
                        model: requestModel,
                        prompt: promptWithAspect,
                        n: 1,
                        response_format: "url",
                        aspect_ratio: aspectRatio
                    };

                    if (refs.length > 0) {
                        payload.image = refs.map(img => `data:${img.mimeType};base64,${img.data}`);
                    }

                    const response = await fetch(`${apiBaseUrl}/v1/images/generations`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(payload),
                        signal: imageAbortController.signal
                    });

                    if (!response.ok) {
                        const err = await response.json().catch(() => ({}));
                        throw new Error(err.error?.message || proxyError || response.status);
                    }

                    const data = await response.json();
                    finalBase64 = extractImageFromProxyResponse(data);

                    if (!finalBase64) {
                        throw new Error(proxyError || "Empty response from proxy image endpoint");
                    }
                } else {
                    const parts = [];
                    if (prompt) parts.push({ text: prompt });
                    refs.forEach(img => parts.push({ inline_data: { mime_type: img.mimeType, data: img.data } }));

                    const payload = {
                        systemInstruction: {
                            parts: [{ text: "You are a specialized image generation AI. Output ONLY the generated image." }]
                        },
                        contents: [{ parts: parts }],
                        safetySettings: [
                            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                        ],
                        generationConfig: {
                            responseModalities: ["IMAGE", "TEXT"],
                            imageConfig: { aspectRatio: aspectRatio, imageSize: resolution }
                        }
                    };

                    let baseUrl = apiBaseUrl || "https://generativelanguage.googleapis.com";
                    baseUrl = baseUrl.replace(/\/+$/, '');

                    const response = await fetch(`${baseUrl}/v1beta/models/${requestModel}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                        signal: imageAbortController.signal
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || response.status);
                    }

                    const data = await response.json();
                    const candidate = data.candidates?.[0];

                    if (candidate?.finishReason === 'SAFETY') throw new Error("Blocked by Safety Filter");
                    if (!candidate?.content?.parts) throw new Error("Empty response");

                    for (const part of candidate.content.parts) {
                        if (part.inlineData) finalBase64 = `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
                    }
                }

                if (finalBase64) {
                    const resultImg = document.getElementById('resultImg');
                    const dlLink = document.getElementById('downloadLink');

                    resultImg.src = finalBase64;
                    resultImg.style.display = 'block';
                    updateImageQueueStatus("Success", "#22c55e");

                    saveToGallery(finalBase64, prompt, resolution, "image");

                    dlLink.onclick = (e) => {
                        e.preventDefault();
                        downloadFile(finalBase64, `gemini-${Date.now()}.png`);
                    };
                    dlLink.style.display = 'block';
                } else {
                    throw new Error("Model returned text only.");
                }
            } catch (e) {
                if (e.name === 'AbortError') return;
                showError('image', e.message);
            } finally {
                if (imageQueue.length === 0) {
                    document.getElementById('cancelBtn').style.display = 'none';
                }
                toggleUI('image', false);
            }
        }

        // --- Generate Image (with queue, max 3) ---
        async function generate() {
            const apiKey = document.getElementById('apiKey').value.trim();
            let prompt = document.getElementById('prompt').value.trim();
            const resolution = document.getElementById('resolution').value;
            const aspectRatio = document.getElementById('aspectRatio').value;
            const model = document.getElementById('imageModelName').value.trim() || DEFAULT_IMAGE_MODEL;
            const visualStyle = document.getElementById('visualStyle').value;
            const renderText = document.getElementById('renderText').value.trim();

            if (!apiKey) return alert("Please enter Google API Key");
            if (!prompt && refImages.length === 0) return alert("Please enter prompt text");

            if (visualStyle) prompt = `[Style: ${visualStyle}] ` + prompt;
            if (renderText) prompt += `\nThe image MUST contain the precise text: "${renderText}"`;

            if (getImageQueueLoad() >= IMAGE_QUEUE_MAX) {
                return alert(`Queue full. Max tasks: ${IMAGE_QUEUE_MAX}`);
            }

            imageQueue.push({
                apiKey,
                prompt,
                resolution,
                aspectRatio,
                model,
                refs: refImages.map(img => ({ mimeType: img.mimeType, data: img.data }))
            });

            updateImageQueueButton();

            if (imageIsProcessing) {
                updateImageQueueStatus("Added to queue", "#666");
            } else {
                updateImageQueueStatus("Task submitted", "#666");
            }

            processImageQueue();
        }
        // ================= Veo 视频生成 (FPS Removed) =================
        async function generateVideo() {
            const apiKey = apiKeyInput.value.trim();
            const prompt = document.getElementById('videoPrompt').value.trim();
            const negPrompt = document.getElementById('negativePrompt').value.trim();
            const model = document.getElementById('veoModelName').value.trim();
            const aspectRatio = document.getElementById('veoAspectRatio').value;
            const seedVal = document.getElementById('videoSeed').value;
            // FPS logic removed

            const apiProtocol = document.getElementById('apiProtocol').value;
            let apiBaseUrl = document.getElementById('apiBaseUrl').value.trim();

            if (!apiKey) return alert("请在生图/配置页面填写 API Key");
            if (!prompt) return alert("请填写视频提示词");

            toggleUI('video', true);
            const status = document.getElementById('videoStatus');

            try {
                status.innerText = "正在提交任务...";

                if (apiProtocol === 'openai') {
                    if (!apiBaseUrl) apiBaseUrl = "https://api.openai.com";
                    apiBaseUrl = apiBaseUrl.replace(/\/+$/, '');

                    const payload = {
                        model: model,
                        messages: [
                            { role: "system", content: "You are a video generation assistant. You must quickly return the final generated video URL if available." },
                            { role: "user", content: prompt }
                        ]
                    };

                    const response = await fetch(`${apiBaseUrl}/v1/chat/completions`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const err = await response.json().catch(() => ({}));
                        throw new Error(err.error?.message || response.status);
                    }

                    const data = await response.json();
                    const content = data.choices?.[0]?.message?.content;

                    if (!content) throw new Error("Empty response from OpenAI endpoint");

                    // Try parsing URL from markdown or plaintext
                    const urlMatch = content.match(/https?:\/\/[^\s"'<()]+/);
                    if (urlMatch) {
                        status.innerText = "生成完成，下载中...";
                        await displayVideo(urlMatch[0], apiKey, prompt);
                    } else {
                        // Output the text straight to the screen if it wasn't a URL
                        throw new Error(`Proxy replied text instead of Direct URL:\n${content.substring(0, 100)}...`);
                    }
                } else {
                    let baseUrl = apiBaseUrl || "https://generativelanguage.googleapis.com";
                    baseUrl = baseUrl.replace(/\/+$/, '');
                    const url = `${baseUrl}/v1beta/models/${model}:predictLongRunning?key=${apiKey}`;

                    // 构建 Instance 对象
                    const instance = { prompt: prompt };

                    // 使用 bytesBase64Encoded (Veo标准)
                    if (videoRefImages.length > 0) {
                        instance.image = {
                            bytesBase64Encoded: videoRefImages[0].data,
                            mimeType: videoRefImages[0].mimeType
                        };
                    }
                    if (videoRefImages.length > 1) {
                        instance.lastFrame = {
                            bytesBase64Encoded: videoRefImages[1].data,
                            mimeType: videoRefImages[1].mimeType
                        };
                    }

                    // 构建 Parameters 对象
                    const parameters = {
                        aspectRatio: aspectRatio,
                        negativePrompt: negPrompt || undefined
                    };

                    if (seedVal && parseInt(seedVal) !== -1) {
                        parameters.seed = parseInt(seedVal);
                    }

                    parameters.sampleCount = 1;

                    const payload = {
                        instances: [instance],
                        parameters: parameters
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (data.error) throw new Error(data.error.message);
                    if (!data.name) throw new Error("未返回 operation name");

                    status.innerText = "生成中 (任务已提交，轮询状态中)...";
                    await pollOperation(data.name, apiKey, prompt, baseUrl);
                }

            } catch (e) {
                showError('video', e.message);
                toggleUI('video', false);
            }
        }

        async function pollOperation(operationName, apiKey, prompt, baseUrl = "https://generativelanguage.googleapis.com") {
            const status = document.getElementById('videoStatus');
            const poll = async () => {
                try {
                    const pollUrl = `${baseUrl}/v1beta/${operationName}?key=${apiKey}`;
                    const res = await fetch(pollUrl);
                    const data = await res.json();

                    if (data.error) throw new Error(data.error.message);

                    if (data.done) {
                        const samples = data.response?.generateVideoResponse?.generatedSamples;
                        if (samples && samples.length > 0 && samples[0].video && samples[0].video.uri) {
                            status.innerText = "生成完成，下载中...";
                            await displayVideo(samples[0].video.uri, apiKey, prompt, 'google');
                        } else {
                            throw new Error("任务完成但未找到视频数据");
                        }
                    } else {
                        status.innerText = `生成中.. (${new Date().toLocaleTimeString()})`;
                        setTimeout(poll, 5000);
                    }
                } catch (e) {
                    showError('video', e.message);
                    toggleUI('video', false);
                }
            };
            setTimeout(poll, 5000);
        }

        async function displayVideo(uri, apiKey, prompt, protocol = 'google') {
            const videoEl = document.getElementById('resultVideo');
            const dlLink = document.getElementById('videoDownloadLink');
            const status = document.getElementById('videoStatus');

            try {
                const fetchOpts = {};
                if (protocol === 'google') {
                    fetchOpts.headers = { 'x-goog-api-key': apiKey };
                }

                const res = await fetch(uri, fetchOpts);
                if (!res.ok) throw new Error(`视频下载失败 HTTP ${res.status}`);

                const blob = await res.blob();
                const reader = new FileReader();
                reader.onload = () => {
                    const base64Data = reader.result;
                    videoEl.src = base64Data;
                    videoEl.style.display = 'block';

                    dlLink.onclick = (e) => {
                        e.preventDefault();
                        downloadFile(base64Data, `veo-video-${Date.now()}.mp4`);
                    };
                    dlLink.style.display = 'block';
                    saveToGallery(base64Data, prompt, "720p", "video");
                    status.innerText = "✅ 视频就绪";
                    status.style.color = "#22c55e";
                    toggleUI('video', false);
                };
                reader.readAsDataURL(blob);
            } catch (e) {
                showError('video', "无法下载: " + e.message);
                toggleUI('video', false);
            }
        }

        // --- UI Helpers ---
        async function downloadFile(url, filename) {
            try {
                // If it's already a data: or blob: URL, downloading might still fail cross-origin/local.
                // Fetching as blob is safer for "download" attribute recognition.
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
            } catch (e) {
                console.warn("Download shim failed, falling back to direct link:", e);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.target = "_blank";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        function toggleUI(mode, isLoading) {
            const loader = document.getElementById(mode === 'image' ? 'loader' : 'videoLoader');
            const ph = document.getElementById(mode === 'image' ? 'placeholder' : 'videoPlaceholder');
            const btn = document.getElementById(mode === 'image' ? 'genBtn' : 'genVideoBtn');
            const res = document.getElementById(mode === 'image' ? 'resultImg' : 'resultVideo');
            const dl = document.getElementById(mode === 'image' ? 'downloadLink' : 'videoDownloadLink');
            const txt = document.getElementById(mode === 'image' ? 'textOutput' : 'videoTextOutput');

            if (mode === 'image') {
                updateImageQueueButton();
            } else {
                btn.disabled = isLoading;
            }
            loader.style.display = isLoading ? 'block' : 'none';
            ph.style.display = isLoading ? 'none' : 'block';

            if (isLoading) {
                res.style.display = 'none';
                dl.style.display = 'none';
                txt.style.display = 'none';
                if (mode === 'video') res.src = "";
            }
        }

        function normalizeApiErrorMessage(msg) {
            const raw = String(msg || '').trim();
            const lower = raw.toLowerCase();
            const apiProtocol = document.getElementById('apiProtocol')?.value || 'google';

            if (lower.includes('consumer') && lower.includes('api_key') && lower.includes('suspended')) {
                if (apiProtocol === 'openai') {
                    return "第三方 API Key 已被上游服务暂停或封禁，当前请求被拒绝。请更换可用 Key，或联系代理服务商处理。原始信息: " + raw;
                }
                return "当前 Google API Key 或其所属项目已被暂停/停用，接口拒绝访问。请更换可用 Key，或到 Google Cloud 检查项目状态、Generative Language API 是否启用，以及账单/风控状态。原始信息: " + raw;
            }

            if (lower.includes('permission denied')) {
                return apiProtocol === 'openai'
                    ? "第三方 API 返回权限不足。请检查代理 Key、账户状态和模型访问权限。原始信息: " + raw
                    : "Google 原生 API 返回权限不足。请检查 API Key、项目权限、接口启用状态和账单状态。原始信息: " + raw;
            }

            return raw;
        }

        function showError(mode, msg) {
            const t = document.getElementById(mode === 'image' ? 'textOutput' : 'videoTextOutput');
            t.innerText = "Error: " + normalizeApiErrorMessage(msg);
            t.style.display = 'block';
            document.getElementById(mode === 'image' ? 'status' : 'videoStatus').innerText = "失败";
            document.getElementById(mode === 'image' ? 'status' : 'videoStatus').style.color = "#ef4444";
        }

        async function fetchModels(targetId) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const apiProtocol = document.getElementById('apiProtocol').value;
            let apiBaseUrl = document.getElementById('apiBaseUrl').value.trim();
            const selectEl = document.getElementById(targetId);

            if (!apiKey) return alert("请先填写 API Key");

            const originalValue = selectEl.value;
            selectEl.innerHTML = '<option value="">正在获取...</option>';
            selectEl.disabled = true;

            try {
                let models = [];
                if (apiProtocol === 'openai') {
                    if (!apiBaseUrl) apiBaseUrl = "https://api.openai.com";
                    apiBaseUrl = apiBaseUrl.replace(/\/+$/, '');
                    const res = await fetch(`${apiBaseUrl}/v1/models`, {
                        headers: { 'Authorization': `Bearer ${apiKey}` }
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if (data.data) {
                        // Some platforms return lots of models, maybe filter relevant ones?
                        // But best to let user see all
                        models = data.data.map(m => m.id);
                    }
                } else {
                    let baseUrl = apiBaseUrl || "https://generativelanguage.googleapis.com";
                    baseUrl = baseUrl.replace(/\/+$/, '');
                    const res = await fetch(`${baseUrl}/v1beta/models?key=${apiKey}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if (data.models) {
                        models = data.models.map(m => m.name.replace('models/', ''));
                    }
                }

                if (models.length === 0) throw new Error("获取到的模型列表为空");

                // 只展示有 'image' 字样的生图模型
                if (targetId === 'imageModelName') {
                    models = models.filter(m => m.toLowerCase().includes('image'));
                    if (models.length === 0) throw new Error("未找到包含 'image' 的可用模型");
                }

                selectEl.innerHTML = '';
                models.forEach(modelId => {
                    const opt = document.createElement('option');
                    opt.value = modelId;
                    opt.innerText = modelId;
                    selectEl.appendChild(opt);
                });

                if (models.includes(originalValue)) {
                    selectEl.value = originalValue;
                } else {
                    selectEl.selectedIndex = 0;
                }
            } catch (e) {
                alert("获取模型失败: " + e.message);
                selectEl.innerHTML = `<option value="${originalValue}">${originalValue}</option>`;
            } finally {
                selectEl.disabled = false;
            }
        }
    </script>
